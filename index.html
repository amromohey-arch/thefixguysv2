<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fix Guys — Sales</title>
<style>
@font-face { font-family:'Glancyr'; font-style:italic; font-weight:400; src:local('Glancyr-LightItalic'); }
@font-face { font-family:'JustSans'; font-weight:400; src:local('JUST Sans Medium'); }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fffefa; --dark:#301d1d; --red:#e31211; --red-dk:#7d0303; --red-pl:#f5efef;
  --blk:#141414; --gd:#4d4d4d; --gm:#e6e6e6; --gl:#f8f7f7; --wh:#ffffff;
  --grn:#16a34a; --grn-l:#dcfce7; --grn-b:#86efac;
  --fd:'Glancyr', Georgia, serif; --fb:'JustSans', 'Helvetica Neue', helvetica, arial, sans-serif;
  --r:10px; --rl:16px; --sh:0 2px 12px rgba(0,0,0,0.06);
}
body { background:var(--bg); font-family:var(--fb); color:var(--blk); width:100%; }
.hdr { background:var(--dark); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.hdr-brand { font-family:var(--fd); font-style:italic; font-size:18px; color:var(--wh); }
.hdr-nav { display:flex; gap:6px; }
.nav-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:var(--r); padding:6px 12px; font-size:12px; font-weight:600; color:var(--wh); cursor:pointer; }
.nav-btn.active { background:var(--red); border-color:var(--red); }
.page { padding:20px; display:none; max-width:800px; margin:0 auto; }
.page.active { display:block; }
.pg-title { font-family:var(--fd); font-style:italic; font-size:24px; margin-bottom:4px; }
.pg-sub { font-size:13px; color:var(--gd); margin-bottom:18px; }
.sec-hd { background:var(--dark); color:var(--wh); font-size:10px; font-weight:700; text-transform:uppercase; padding:8px 12px; border-radius:var(--r) var(--r) 0 0; }
.scanner-card { background:var(--blu-l); border:1.5px solid #bfdbfe; border-radius:var(--rl); padding:20px; margin-bottom:18px; }
.upload-btn { background:var(--dark); border-radius:var(--r); padding:12px; display:flex; flex-direction:column; align-items:center; cursor:pointer; color:#fff; font-size:12px; flex:1; }
.date-row { display:flex; align-items:center; gap:10px; margin-bottom:15px; flex-wrap:wrap; }
.date-inp, .cust-inp { border:1.5px solid var(--gm); border-radius:var(--r); padding:8px; font-family:var(--fb); outline:none; }
.dept-wrap { background:var(--wh); border:1.5px solid var(--gm); border-top:none; border-radius:0 0 var(--rl) var(--rl); overflow:hidden; margin-bottom:18px; box-shadow:var(--sh); }
.col-heads, .dept-row, .totals-row { display:grid; grid-template-columns:30px 1fr 80px 100px; padding:8px 12px; gap:8px; align-items:center; }
.col-heads { background:var(--gl); font-size:10px; font-weight:700; color:var(--gd); text-transform:uppercase; }
.n-inp, .d-inp { background:var(--gl); border:1.5px solid var(--gm); border-radius:6px; padding:6px; text-align:right; width:100%; outline:none; }
.totals-row { background:var(--red-pl); border-top:2px solid var(--red); font-weight:700; color:var(--red-dk); }
.cash-wrap { background:var(--wh); border:1.5px solid var(--gm); border-top:none; border-radius:0 0 var(--rl) var(--rl); padding:15px; display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:15px; }
.cash-inp { width:100%; border:1.5px solid var(--gm); border-radius:8px; padding:10px; font-size:18px; font-weight:700; text-align:right; background:var(--gl); outline:none; }
.banking-bar { background:var(--dark); border-radius:var(--r); padding:15px; display:flex; justify-content:space-between; color:#fff; margin-bottom:10px; }
.diff-bar { border-radius:var(--r); padding:12px; display:flex; justify-content:space-between; margin-bottom:20px; font-weight:600; }
.diff-bar.ok { background:var(--grn-l); color:var(--grn); border:1.5px solid var(--grn-b); }
.diff-bar.under { background:#fef2f2; color:var(--red); border:1.5px solid #fca5a5; }
.notes-ta { width:100%; border:1.5px solid var(--gm); border-top:none; border-radius:0 0 var(--r) var(--r); padding:10px; min-height:80px; margin-bottom:20px; outline:none; }
.btn-submit { width:100%; background:var(--red); border:none; border-radius:var(--r); padding:18px; font-family:var(--fd); font-style:italic; font-size:18px; color:white; cursor:pointer; }
.btn-submit:disabled { background:var(--gm); color:#999; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">TFG — Sales Sync</div>
  <div class="hdr-nav">
    <button class="nav-btn active" onclick="showTab('entry', this)">Entry</button>
    <button class="nav-btn" onclick="showTab('history', this)">History</button>
    <button class="nav-btn" onclick="showTab('setup', this)">Setup</button>
  </div>
</div>

<div id="pg-entry" class="page active">
  <div class="pg-title">Daily Sales Entry</div>
  <div id="day-label" class="pg-sub">...</div>

  <div class="date-row">
    <label style="font-size:12px; font-weight:700;">DATE</label>
    <input type="date" id="sales-date" class="date-inp" onchange="updateDayLabel()">
    <label style="font-size:12px; font-weight:700; margin-left:auto;">CUSTOMERS</label>
    <input type="number" id="customers" class="cust-inp" style="width:70px" placeholder="0">
  </div>

  <div class="sec-hd">Department Totals</div>
  <div class="dept-wrap">
    <div class="col-heads"><span>#</span><span>Dept</span><span>Jobs</span><span>Total ($)</span></div>
    <div id="dept-container"></div>
    <div class="totals-row"><span></span><span>TOTAL</span><span id="t-jobs">0</span><span id="t-sales">$0.00</span></div>
  </div>

  <div class="sec-hd">Payment Summary</div>
  <div class="cash-wrap">
    <div><label style="font-size:10px; font-weight:700; color:var(--gd);">CASH</label><input type="number" id="cash" class="cash-inp calc" step="0.01"></div>
    <div><label style="font-size:10px; font-weight:700; color:var(--gd);">EFTPOS</label><input type="number" id="eftpos" class="cash-inp calc" step="0.01"></div>
  </div>

  <div class="banking-bar"><span>Total Banking</span><span id="banking" style="font-weight:700; font-size:20px;">$0.00</span></div>
  <div id="diff-bar" class="diff-bar ok"><span>Status</span><span id="diff-val">$0.00</span></div>

  <div class="sec-hd">Notes</div>
  <textarea id="notes" class="notes-ta" placeholder="Discrepancies, weather, etc..."></textarea>

  <button class="btn-submit" id="btn-submit" onclick="submitData()">Submit to Cloud Sync</button>
</div>

<div id="pg-history" class="page">
  <div class="pg-title">Recent History</div>
  <div id="history-list" style="background:#fff; border:1.5px solid var(--gm); border-radius:var(--r); min-height:200px;"></div>
</div>

<div id="pg-setup" class="page">
  <div class="pg-title">Setup</div>
  <div class="dept-wrap" style="padding:20px; border-top:none; border-radius:var(--r);">
    <label style="font-size:11px; font-weight:700;">GOOGLE SCRIPT URL</label>
    <input type="text" id="script-url" class="n-inp" style="text-align:left; margin-top:5px;" placeholder="https://script.google.com/...">
    <button class="btn-submit" style="margin-top:15px; padding:10px; font-size:14px;" onclick="saveSetup()">Save & Connect</button>
  </div>
</div>

<script>
const depts = [
  {id:'01', n:'Remotes'}, {id:'02', n:'Patching'}, {id:'03', n:'Shells'}, 
  {id:'04', n:'Stitch'}, {id:'05', n:'Transponders'}, {id:'06', n:'Heel & Sole'},
  {id:'07', n:'Shoecare'}, {id:'08', n:'Misc'}, {id:'09', n:'Bands'},
  {id:'10', n:'Keys'}, {id:'11', n:'Engraving'}, {id:'12', n:'W.30 Repair'},
  {id:'13', n:'Batteries'}, {id:'14', n:'Glue'}, {id:'15', n:'Giftware'}, {id:'16', n:'Sharp'}
];

document.addEventListener('DOMContentLoaded', () => {
  const cont = document.getElementById('dept-container');
  depts.forEach(d => {
    cont.innerHTML += `
      <div class="dept-row">
        <span style="font-size:10px; font-weight:700; color:var(--gd);">${d.id}</span>
        <span style="font-size:13px;">${d.n}</span>
        <input type="number" class="n-inp calc dept-j" placeholder="0">
        <input type="number" class="d-inp calc dept-s" placeholder="0.00" step="0.01">
      </div>`;
  });
  document.getElementById('sales-date').value = new Date().toISOString().split('T')[0];
  updateDayLabel();
  document.querySelectorAll('.calc').forEach(i => i.addEventListener('input', calculate));
  if(localStorage.getItem('tfg_url')) document.getElementById('script-url').value = localStorage.getItem('tfg_url');
});

function updateDayLabel() {
  const d = new Date(document.getElementById('sales-date').value);
  document.getElementById('day-label').innerText = d.toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long' });
}

function calculate() {
  let jTotal = 0, sTotal = 0;
  document.querySelectorAll('.dept-j').forEach(el => jTotal += Number(el.value || 0));
  document.querySelectorAll('.dept-s').forEach(el => sTotal += Number(el.value || 0));
  
  const cash = Number(document.getElementById('cash').value || 0);
  const eft = Number(document.getElementById('eftpos').value || 0);
  const bank = cash + eft;
  const diff = bank - sTotal;

  document.getElementById('t-jobs').innerText = jTotal;
  document.getElementById('t-sales').innerText = '$' + sTotal.toFixed(2);
  document.getElementById('banking').innerText = '$' + bank.toFixed(2);
  
  const dBar = document.getElementById('diff-bar');
  const dVal = document.getElementById('diff-val');
  dVal.innerText = (diff >= 0 ? '+' : '') + '$' + diff.toFixed(2);
  dBar.className = Math.abs(diff) < 0.01 ? 'diff-bar ok' : 'diff-bar under';
}

async function submitData() {
  const url = localStorage.getItem('tfg_url');
  if(!url) return alert("Go to Setup first!");
  
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.innerText = "Syncing...";

  const dateVal = document.getElementById('sales-date').value;
  const dayName = new Date(dateVal).toLocaleDateString('en-AU', { weekday:'short' });

  const payload = {
    date: dateVal,                                          // Col A
    day: dayName,                                           // Col B
    customers: document.getElementById('customers').value || 0, // Col C
    total_jobs: document.getElementById('t-jobs').innerText, // Col D
    total_sales: document.getElementById('t-sales').innerText.replace('$',''), // Col E
    cash: document.getElementById('cash').value || 0,       // Col F
    eftpos: document.getElementById('eftpos').value || 0,   // Col G
    notes: document.getElementById('notes').value,          // Col H
    timestamp: new Date().toISOString()                     // Col I
  };

  try {
    await fetch(url, { method:'POST', mode:'no-cors', body:JSON.stringify(payload) });
    alert("✅ Synced to Google Sheets!");
    location.reload(); 
  } catch(e) { alert("Error connecting to Google."); }
  btn.disabled = false;
}

async function loadHistory() {
  const url = localStorage.getItem('tfg_url');
  const list = document.getElementById('history-list');
  if(!url) return list.innerHTML = "<p style='padding:20px'>Setup URL first.</p>";
  
  list.innerHTML = "<p style='padding:20px'>Loading Cloud Data...</p>";
  try {
    const res = await fetch(url + "?action=get");
    const data = await res.json();
    list.innerHTML = data.map(r => `
      <div style="padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
        <span><b>${r.date}</b></span>
        <span style="color:var(--red); font-weight:700;">$${r.total_sales}</span>
      </div>`).join('');
  } catch(e) { list.innerHTML = "<p style='padding:20px'>No data found yet.</p>"; }
}

function showTab(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  btn.classList.add('active');
  if(id === 'history') loadHistory();
}

function saveSetup() {
  localStorage.setItem('tfg_url', document.getElementById('script-url').value);
  alert("URL Saved!");
}
</script>
</body>
</html>
