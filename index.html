<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fix Guys — Sales</title>
<style>
/* ── FONTS & RESET ── */
@font-face { font-family:'Glancyr'; font-style:italic; font-weight:400; src:local('Glancyr-LightItalic'); }
@font-face { font-family:'JustSans'; font-weight:400; src:local('JUST Sans Medium'); }

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }

:root {
  --bg:      #fffefa;
  --dark:    #301d1d;
  --red:     #e31211;
  --red-dk:  #7d0303;
  --red-pl:  #f5efef;
  --blk:     #141414;
  --gd:      #4d4d4d;
  --gm:      #e6e6e6;
  --gl:      #f8f7f7;
  --wh:      #ffffff;
  --grn:     #16a34a;
  --grn-l:   #dcfce7;
  --grn-b:   #86efac;
  --blu:     #2563eb;
  --blu-l:   #eff6ff;
  --fd: 'Glancyr', Georgia, serif;
  --fb: 'JustSans', 'Helvetica Neue', sans-serif;
  --r:  10px;
  --rl: 16px;
  --sh: 0 2px 12px rgba(0,0,0,0.06);
}

body { background:var(--bg); font-family:var(--fb); color:var(--blk); width:100%; overflow-x: hidden; }

/* ── HEADER ── */
.hdr { background:var(--dark); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; position: sticky; top: 0; z-index: 100; }
.hdr-brand { font-family:var(--fd); font-style:italic; font-size:clamp(15px,3vw,19px); color:var(--wh); }
.hdr-nav { display:flex; gap:6px; }
.nav-btn {
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:var(--r);
  padding:6px 13px; font-family:var(--fb); font-size:12px; font-weight:600;
  color:var(--wh); text-decoration:none; cursor:pointer; transition: 0.15s;
}
.nav-btn.active { background:var(--red); border-color:var(--red); }

/* ── LAYOUT ── */
.page { padding: 20px; display: none; max-width: 800px; margin: 0 auto; }
.page.active { display: block; }
.pg-title { font-family:var(--fd); font-style:italic; font-size:26px; color:var(--blk); margin-bottom:4px; }
.pg-sub { font-size:13px; color:var(--gd); margin-bottom:18px; }
.sec-hd { background:var(--dark); color:var(--wh); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; padding:9px 14px; border-radius:var(--r) var(--r) 0 0; }
.warn-banner { background:#fef9c3; border:1.5px solid #fde047; border-radius:var(--r); padding:12px; font-size:12px; color:#713f12; margin-bottom:18px; display: none; }

/* ── DEPT TABLE ── */
.dept-wrap { background:var(--wh); border:1.5px solid var(--gm); border-top:none; border-radius:0 0 var(--rl) var(--rl); overflow:hidden; box-shadow:var(--sh); margin-bottom:18px; }
.dept-row, .col-heads, .totals-row { display:grid; grid-template-columns: 40px 1fr 80px 100px; align-items:center; padding:10px 12px; gap: 5px; }
.col-heads { background:var(--gl); border-bottom:1.5px solid var(--gm); font-size:10px; font-weight:700; color:var(--gd); text-transform:uppercase; }
.col-heads span:nth-child(3), .col-heads span:nth-child(4) { text-align:right; }
.dept-row { border-bottom:1px solid var(--gl); }
.n-inp, .d-inp, .cash-inp, .cust-inp { background:var(--gl); border:1.5px solid var(--gm); border-radius:6px; padding:6px; font-family:var(--fb); text-align:right; width: 100%; outline: none; }
.n-inp:focus, .d-inp:focus { border-color:var(--red); background: #fff; }
.totals-row { background:var(--red-pl); border-top:2px solid var(--red); font-weight: 700; color: var(--red-dk); }
.totals-row span:nth-child(3), .totals-row span:nth-child(4) { text-align:right; }

/* ── SUMMARY & BARS ── */
.cash-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.banking-bar { background:var(--dark); border-radius:var(--r); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; color:#fff; margin-bottom:10px; }
.banking-bar .bv { font-family:var(--fd); font-style:italic; font-size:22px; }
.diff-bar { border-radius:var(--r); padding:11px 16px; display:flex; justify-content:space-between; align-items:center; border: 1.5px solid transparent; }
.diff-bar.ok { background:var(--grn-l); border-color:var(--grn-b); color: var(--grn); }
.diff-bar.under { background:#fef2f2; border-color:#fca5a5; color: var(--red); }
.diff-bar.over { background:#fefce8; border-color:#fde047; color: #854d0e; }

/* ── UTILS ── */
.btn-submit { width:100%; background:var(--red); border:none; border-radius:var(--r); padding:16px; font-family:var(--fd); font-style:italic; font-size:18px; color:white; cursor:pointer; margin-top: 20px; transition: 0.2s; }
.btn-submit:active { transform: scale(0.98); }
.btn-submit:disabled { background: var(--gm); color: #999; cursor: not-allowed; }

@media(max-width: 480px) {
    .dept-row, .col-heads, .totals-row { grid-template-columns: 30px 1fr 60px 85px; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">The Fix Guys — Sales</div>
  <div class="hdr-nav">
    <div class="nav-btn active" onclick="showPage('entry')">Entry</div>
    <div class="nav-btn" onclick="showPage('history')">History</div>
    <div class="nav-btn" onclick="showPage('setup')">Setup</div>
  </div>
</div>

<div id="pg-entry" class="page active">
  <div class="pg-title">Daily Sales</div>
  <div class="pg-sub" id="current-date-display">...</div>

  <div class="warn-banner" id="conn-warn">⚠️ Cloud Sync is not connected. Visit Setup.</div>

  <div class="date-row" style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
    <label style="font-size: 13px; font-weight: 700;">Date:</label>
    <input type="date" id="sales-date" class="n-inp" style="text-align: left; width: auto;">
    <label style="font-size: 13px; font-weight: 700; margin-left: auto;">Customers:</label>
    <input type="number" id="customers" class="cust-inp" style="width: 70px;" placeholder="0">
  </div>

  <div class="sec-hd">Department Sales</div>
  <div class="dept-wrap">
    <div class="col-heads"><span>#</span><span>Dept</span><span>Jobs</span><span>Total</span></div>
    <div id="dept-list"></div>
    <div class="totals-row"><span></span><span>TOTAL</span><span id="sum-jobs">0</span><span id="sum-sales">$0.00</span></div>
  </div>

  <div class="sec-hd">Cash & Card</div>
  <div class="dept-wrap" style="padding: 15px; border-top: none;">
    <div class="cash-wrap">
        <div><label style="font-size: 10px; font-weight: 700; color: var(--gd);">CASH ($)</label><input type="number" id="cash-val" class="cash-inp calc" step="0.01" placeholder="0.00"></div>
        <div><label style="font-size: 10px; font-weight: 700; color: var(--gd);">EFTPOS ($)</label><input type="number" id="card-val" class="cash-inp calc" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="banking-bar"><span class="bl">Total Banking</span><span class="bv" id="total-banking">$0.00</span></div>
    <div id="diff-bar" class="diff-bar ok"><span id="diff-label">Balanced</span><span id="diff-val" class="dv">$0.00</span></div>
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submitToCloud()">Submit to Google Sheets</button>
</div>

<div id="pg-history" class="page">
    <div class="pg-title">History</div>
    <div class="pg-sub">Cloud-synced records</div>
    <div id="history-content" style="font-size: 13px; color: var(--gd);">Fetching latest records...</div>
</div>

<div id="pg-setup" class="page">
    <div class="pg-title">Setup</div>
    <div class="pg-sub">App Configuration</div>
    <div class="dept-wrap" style="padding: 20px; border-top: none;">
        <label style="font-size: 11px; font-weight: 700; display: block; margin-bottom: 5px;">GOOGLE APPS SCRIPT URL</label>
        <input type="password" id="script-url" class="n-inp" style="text-align: left;" placeholder="https://script.google.com/...">
        <button class="btn-submit" style="margin-top: 15px; padding: 10px; font-size: 14px;" onclick="saveSetup()">Save Config</button>
    </div>
</div>

<script>
/* ── CONFIG ── */
const departments = [
    { id: '1', name: 'Mobile Repairs' },
    { id: '2', name: 'Accessories' },
    { id: '3', name: 'Keys / Engraving' },
    { id: '4', name: 'Watch / Other' }
];

/* ── INIT ── */
function init() {
    const list = document.getElementById('dept-list');
    departments.forEach(d => {
        list.innerHTML += `
            <div class="dept-row">
                <span style="font-size: 10px; font-weight: 700; color: var(--gd);">${d.id}</span>
                <span style="font-size: 13px;">${d.name}</span>
                <input type="number" class="n-inp calc dept-j" placeholder="0">
                <input type="number" class="d-inp calc dept-s" step="0.01" placeholder="0.00">
            </div>`;
    });
    
    document.querySelectorAll('.calc').forEach(el => el.addEventListener('input', runCalculations));
    
    // Set Date
    const now = new Date();
    document.getElementById('sales-date').value = now.toISOString().split('T')[0];
    document.getElementById('current-date-display').innerText = now.toDateString();
    
    checkConnection();
}

/* ── CALCULATIONS ── */
function runCalculations() {
    let totalJobs = 0, totalSales = 0;
    
    document.querySelectorAll('.dept-j').forEach(el => totalJobs += Number(el.value || 0));
    document.querySelectorAll('.dept-s').forEach(el => totalSales += Number(el.value || 0));
    
    const cash = Number(document.getElementById('cash-val').value || 0);
    const card = Number(document.getElementById('card-val').value || 0);
    const totalBanking = cash + card;
    const diff = totalBanking - totalSales;

    document.getElementById('sum-jobs').innerText = totalJobs;
    document.getElementById('sum-sales').innerText = '$' + totalSales.toFixed(2);
    document.getElementById('total-banking').innerText = '$' + totalBanking.toFixed(2);
    
    const dVal = document.getElementById('diff-val');
    const dBar = document.getElementById('diff-bar');
    const dLab = document.getElementById('diff-label');

    dVal.innerText = (diff >= 0 ? '+' : '') + '$' + diff.toFixed(2);
    
    if (Math.abs(diff) < 0.01) {
        dBar.className = 'diff-bar ok'; dLab.innerText = 'Balanced';
    } else if (diff > 0) {
        dBar.className = 'diff-bar over'; dLab.innerText = 'Over';
    } else {
        dBar.className = 'diff-bar under'; dLab.innerText = 'Short';
    }
}

/* ── NAVIGATION ── */
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('pg-' + id).classList.add('active');
    event.currentTarget.classList.add('active');
    if(id === 'history') loadHistory();
}

/* ── CLOUD SYNC LOGIC ── */
async function submitToCloud() {
    const url = localStorage.getItem('tfg_url');
    if (!url) return alert("Setup your Google Script URL first!");

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerText = "Syncing...";

    const data = {
        date: document.getElementById('sales-date').value,
        customers: document.getElementById('customers').value,
        cash: document.getElementById('cash-val').value,
        card: document.getElementById('card-val').value,
        total_sales: document.getElementById('sum-sales').innerText,
        user: "Device_User" 
    };

    try {
        await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("Success! Entry synced to Google Sheets.");
        document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
        runCalculations();
    } catch (e) {
        alert("Error syncing. Check connection.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Submit to Google Sheets";
    }
}

async function loadHistory() {
    const url = localStorage.getItem('tfg_url');
    const cont = document.getElementById('history-content');
    if(!url) return cont.innerText = "No Connection URL.";

    try {
        const res = await fetch(url + "?action=get");
        const data = await res.json();
        cont.innerHTML = data.map(r => `<div class="dept-row"><span>${r.date}</span><span>Total: ${r.total_sales}</span></div>`).join('');
    } catch (e) {
        cont.innerText = "Check your connection settings.";
    }
}

/* ── SETUP ── */
function saveSetup() {
    localStorage.setItem('tfg_url', document.getElementById('script-url').value);
    alert("Saved!");
    checkConnection();
}

function checkConnection() {
    const url = localStorage.getItem('tfg_url');
    document.getElementById('conn-warn').style.display = url ? 'none' : 'block';
    if(url) document.getElementById('script-url').value = url;
}

init();
</script>
</body>
</html>
